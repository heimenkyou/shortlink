        blog.csdn.net: "CSDN 博客"
        juejin.cn: "稀土掘金技术社区"
        zhihu.com: "知乎专栏"
        oschina.net: "开源中国社区"
        segmentfault.com: "思否技术问答"
        leetcode.cn: "力扣刷题站"
        spring.io: "Spring 官方文档"
        docs.oracle.com: "Oracle 官方文档"
        apache.org: "Apache 开源基金会"

        # ===== 视频 & 弹幕 =====
