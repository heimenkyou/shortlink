server:
  port: 8002

spring:
  profiles:
    active: prod
  application:
    name: shortlink-admin
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
  datasource:
    # ShardingSphere 对 Driver 自定义，实现分库分表等隐藏逻辑
    driver-class-name: org.apache.shardingsphere.driver.ShardingSphereDriver
    # ShardingSphere 配置文件路径
    url: jdbc:shardingsphere:classpath:shardingsphere-config.yaml
    hikari:
      connection-test-query: select 1
      connection-timeout: 20000
      idle-timeout: 300000
      maximum-pool-size: 5
      minimum-idle: 5
  data:
    redis:
      host: ${app.redis.host}
      port: ${app.redis.port:6379}
      password: ${app.redis.password}
      database: ${app.redis.database:2}
  web:
    resources:
      add-mappings: false # 禁止默认的静态资源映射
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 500MB

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml  #指定sql映射文件
  configuration:
    map-underscore-to-camel-case: true # 开启驼峰命名

springdoc:
  # 默认展开参数
  default-flat-param-object: true
  swagger-ui:
    enabled: false
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    enabled: false
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: cn.luowb.shortlink.admin

sa-token:
  token-name: Authorization
  active-timeout: 1800

app:
  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:2}
  group:
    max-count: 20
  flow-risk-control:
    window-seconds: 1
    max-requests: 20
  security:
    whitelist:
      # 部署到公网设为 true，本地调试设为 false
      enabled: true
      # 开发者运行时修改白名单开关使用的令牌，请部署时通过环境变量覆盖
      # 查询状态：curl -H "X-ShortLink-Dev-Token: 你的令牌" http://localhost:8002/internal/dev/v1/origin-url-whitelist
      # 更新状态：curl -X POST ^
      #  -H "Content-Type: application/json" ^
      #  -H "X-ShortLink-Dev-Token: 你的令牌" ^
      #  -d "{\"enabled\":false}" ^
      #  http://localhost:8002/internal/dev/v1/origin-url-whitelist
      manage-token: ${WHITELIST_MANAGE_TOKEN:}
      # key = 域名（支持通配符 *.xxx），value = 展示给用户看的友好名称
      domain-name-map:
        # ===== 技术开发 & 社区 =====
        "[*.luowb.cn]": "罗文彬的个人站"
