logging:
  level:
    cn.luowb.shortlink: debug
    cn.luowb.shortlink.controller: debug
    cn.luowb.shortlink.dao.mapper: debug

spring:
  web:
    resources:
      add-mappings: true
  datasource:
    url: jdbc:shardingsphere:classpath:shardingsphere-aggregation-dev.yaml

springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true

app:
  mysql:
    host: ${DATABASE_HOST:127.0.0.1}
    port: ${DATABASE_PORT:3306}
    database: ${DATABASE_NAME:link}
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:}
  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:2}
  flow-risk-control:
    window-seconds: 2
    max-requests: 5
  security:
    whitelist:
      manage-token: ${WHITELIST_MANAGE_TOKEN:}
      domain-name-map:
        localhost: "本地开发环境"
        127.0.0.1: "本机IP地址"
